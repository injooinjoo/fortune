  <!-- Remove Flutter's default blue loading progress bar -->
  <style>
    .flutter-loader {
      display: none !important;
    }
    
    /* Optional: Add custom loading screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(212, 190, 154, 0.32), transparent 48%),
        linear-gradient(180deg, #fcf8ef 0%, #f7f3e9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-shell {
      width: 320px;
      min-height: 192px;
      box-sizing: border-box;
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(255, 252, 246, 0.92);
      border: 1px solid rgba(126, 93, 42, 0.08);
      box-shadow: 0 24px 60px rgba(73, 53, 17, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
    }

    .loading-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: #1f1710;
      color: #fdf8ef;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .loading-title {
      margin: 0;
      color: #24170b;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.15;
    }

    .loading-subtitle {
      margin: 0;
      color: #6a5135;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
    }

    .spinner {
      width: 42px;
      height: 42px;
      box-sizing: border-box;
      border: 4px solid rgba(140, 112, 75, 0.16);
      border-top-color: #8c704b;
      border-radius: 50%;
      animation: loading-spin 1s linear infinite;
    }
    
    #loading.hidden {
      display: none;
    }

    @keyframes loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation-duration: 2.2s;
      }
    }
  </style>

  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #F7F3E9;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1C1C1C;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  
  
  
  
  
  
  
  <!-- Custom Loading Screen -->
  <div id="loading" aria-live="polite">
    <div class="loading-shell" role="status">
      <div class="loading-badge">ZPZG</div>
      <p class="loading-title">Preparing your next reading</p>
      <p class="loading-subtitle">Launching Fortune with a stable web session.</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    // Force HTML renderer to avoid Wasm incompatibilities
    window.flutterWebRenderer = "html";
  </script>
  
  <script src="flutter_bootstrap.js" async=""></script>
  
  <script>
    // TEMPORARY FIX: Clear ALL recentFortunes cache to fix type errors
    // This will force a fresh start for fortune cache
    try {
      // Remove all recentFortunes related cache
      localStorage.removeItem('flutter.recentFortunes');
      console.log('🗑️ Force cleared ALL recentFortunes cache from localStorage');
      
      // Also clear any other potentially problematic cache
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.includes('recentFortunes')) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(key => {
        localStorage.removeItem(key);
        console.log(`🗑️ Removed cache key: ${key}`);
      });
    } catch(e) {
      console.log('Could not clear cache:', e);
    }
    
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').classList.add('hidden');
    });
    
    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service_worker.js')
          .then((registration) => {
            console.log('Service Worker registered:', registration);
          })
          .catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>
