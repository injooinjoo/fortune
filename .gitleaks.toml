# Gitleaks configuration for Fortune project

[allowlist]
description = "Allowlisted files and patterns"
paths = [
    '''\.env\.example$''',
    '''\.env\..*\.example$''',
    '''firebase_options_secure\.dart$''',
    '''secrets\.txt$''',
    '''(^|/)docs/development/reports/''',
    '''(^|/)fortune_flutter/flutter_build_log\.txt$''',
    '''(^|/)node_modules/''',
    '''(^|/)supabase/\.temp/''',
]

[[rules]]
id = "firebase-api-key"
description = "Firebase API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
tags = ["key", "Firebase"]

[[rules]]
id = "stripe-api-key"
description = "Stripe API Key"
regex = '''(?i)(sk|pk)_(test|live)_[0-9a-zA-Z]{24,}'''
tags = ["key", "Stripe"]

[[rules]]
id = "jwt-token"
description = "JWT"
regex = '''eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*'''
tags = ["key", "JWT"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{48}'''
tags = ["key", "OpenAI"]

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)(api_key|apikey|secret|password|passwd|pwd|token|api_token|private_key|client_secret)\s*[=:]\s*["\']?(?!process\.env\b|Deno\.env\b|dotenv\b|your[-_a-z0-9]*\b|placeholder[-_a-z0-9]*\b|mock[-_a-z0-9]*\b|sample[-_a-z0-9]*\b|test[-_a-z0-9]*\b|redacted\b)(?=[A-Za-z0-9\-_.=]{16,}["\']?\s*$)(?=[A-Za-z0-9\-_.=]*[A-Za-z])(?=[A-Za-z0-9\-_.=]*[0-9])[A-Za-z0-9\-_.=]+["\']?\s*$'''
tags = ["secret", "generic"]

# Custom rules for Fortune project
[[rules]]
id = "supabase-service-role-key"
description = "Supabase Service Role Key"
regex = '''SUPABASE_SERVICE_ROLE_KEY\s*=\s*["\']?(?!process\.env\b|Deno\.env\b|dotenv\b|your[-_a-z0-9]*\b|placeholder[-_a-z0-9]*\b|mock[-_a-z0-9]*\b|sample[-_a-z0-9]*\b|test[-_a-z0-9]*\b)(?=[A-Za-z0-9\-_.=]{20,}["\']?\s*$)(?=[A-Za-z0-9\-_.=]*[A-Za-z])(?=[A-Za-z0-9\-_.=]*[0-9])[A-Za-z0-9\-_.=]+["\']?\s*$'''
tags = ["key", "Supabase"]

[[rules]]
id = "upstash-redis-rest-token"
description = "Redis/Upstash Token"
regex = '''UPSTASH_REDIS_REST_TOKEN\s*=\s*["\']?(?!process\.env\b|Deno\.env\b|dotenv\b|your[-_a-z0-9]*\b|placeholder[-_a-z0-9]*\b|mock[-_a-z0-9]*\b|sample[-_a-z0-9]*\b|test[-_a-z0-9]*\b)(?=[A-Za-z0-9\-_.=]{20,}["\']?\s*$)(?=[A-Za-z0-9\-_.=]*[A-Za-z])(?=[A-Za-z0-9\-_.=]*[0-9])[A-Za-z0-9\-_.=]+["\']?\s*$'''
tags = ["token", "Redis"]

[[rules]]
id = "postgres-dsn-with-credentials"
description = "Postgres/Supabase DSN with embedded credentials"
regex = '''(?i)postgres(?:ql)?://[A-Za-z0-9._%+\-]+:[^@\s]+@[A-Za-z0-9.\-]+(?::\d+)?/[A-Za-z0-9._-]+'''
tags = ["secret", "database", "postgres", "supabase"]
