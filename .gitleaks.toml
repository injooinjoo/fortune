# Gitleaks configuration for Fortune project

[allowlist]
description = "Allowlisted files and patterns"
paths = [
    '''\.env\.example$''',
    '''\.env\..*\.example$''',
    '''firebase_options_secure\.dart$''',
    '''secrets\.txt$''',
    '''(^|/)docs/development/reports/''',
    '''(^|/)fortune_flutter/flutter_build_log\.txt$''',
    '''(^|/)node_modules/''',
    '''(^|/)supabase/\.temp/''',
]
regexes = [
    '''process\.env\.[A-Z0-9_]+''',
    '''Deno\.env\.get\(['"][A-Z0-9_]+['"]\)''',
    '''(?i)(placeholder|not-real|redacted|for-ci-only)''',
]

[[rules]]
id = "firebase-api-key"
description = "Firebase API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
tags = ["key", "Firebase"]

[[rules]]
id = "stripe-api-key"
description = "Stripe API Key"
regex = '''(?i)(sk|pk)_(test|live)_[0-9a-zA-Z]{24,}'''
tags = ["key", "Stripe"]

[[rules]]
id = "jwt-token"
description = "JWT"
regex = '''eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*'''
tags = ["key", "JWT"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{48}'''
tags = ["key", "OpenAI"]

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)[A-Za-z0-9_]*(?:api[_-]?key|apikey|secret|password|passwd|pwd|token|api_token|private_key|client_secret)[A-Za-z0-9_]*\s*[=:]\s*["\']([A-Za-z0-9._/+=-]{16,})["\']'''
secretGroup = 1
tags = ["secret", "generic"]

# Custom rules for Fortune project
[[rules]]
id = "supabase-service-role-key"
description = "Supabase Service Role Key"
regex = '''SUPABASE_SERVICE_ROLE_KEY\s*=\s*["\']?[A-Za-z0-9\-_.=]{20,}["\']?'''
tags = ["key", "Supabase"]

[[rules]]
id = "upstash-redis-rest-token"
description = "Redis/Upstash Token"
regex = '''UPSTASH_REDIS_REST_TOKEN\s*=\s*["\']?[A-Za-z0-9\-_.=]{20,}["\']?'''
tags = ["token", "Redis"]

[[rules]]
id = "postgres-dsn-with-credentials"
description = "Postgres/Supabase DSN with embedded credentials"
regex = '''(?i)postgres(?:ql)?://[A-Za-z0-9._%+\-]+:[^@\s]+@[A-Za-z0-9.\-]+(?::\d+)?/[A-Za-z0-9._-]+'''
tags = ["secret", "database", "postgres", "supabase"]
