<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>route_profile_verification / dark</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000000;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    }
    .stage {
      width: 760px;
      min-height: 1180px;
      margin: 0 auto;
      padding: 40px 0;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 20px;
    }
    .meta {
      width: 520px;
      display: grid;
      gap: 6px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f3f4f6;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
    }
    .phone-shell {
      width: 520px;
      border-radius: 36px;
      background: #111111;
      border: 1px solid #2f2f2f;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.16);
    }
    .screen {
      width: 440px;
      height: 956px;
      border-radius: 30px;
      overflow: hidden;
      margin: 0 auto;
      border: 1px solid #2f2f2f;
      background: #111111;
    }
    .screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <main class="stage" data-section="Mobile Real v2 / Dark" data-surface-id="route_profile_verification" data-theme="dark">
    <section class="meta">
      <div class="title">route_profile_verification / dark</div>
      <div class="subtitle">surface_type: route | route: /profile/verification</div>
    </section>
    <section class="phone-shell">
      <div class="screen">
        <img src="../../../raw/route_profile_verification/dark.png" alt="route_profile_verification dark" />
      </div>
    </section>
  </main>
</body>
</html>
