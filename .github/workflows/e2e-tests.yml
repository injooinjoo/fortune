name: E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - all

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20.x'

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      exit_code: ${{ steps.run.outputs.exit_code }}
      passed: ${{ steps.results.outputs.passed }}
      failed: ${{ steps.results.outputs.failed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup test environment
        run: |
          cat > .env <<'ENVEOF'
          NODE_ENV=test
          TEST_MODE=true
          BYPASS_AUTH=true
          USE_MOCK_DATA=true
          MOCK_FORTUNE_RESPONSES=true
          BYPASS_PAYMENT=true
          MOCK_PREMIUM_FEATURES=true
          SUPABASE_URL=https://test-placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder-test-anon-key
          GOOGLE_WEB_CLIENT_ID=000000000000-placeholder.apps.googleusercontent.com
          GOOGLE_IOS_CLIENT_ID=000000000000-placeholder-ios.apps.googleusercontent.com
          GOOGLE_ANDROID_CLIENT_ID=000000000000-placeholder-android.apps.googleusercontent.com
          KAKAO_REST_API_KEY=placeholder_kakao_key
          ENABLE_ADS=false
          DISABLE_ANALYTICS=true
          ENVEOF

      - name: Run Playwright suite
        id: run
        run: |
          TEST_TYPE="${TEST_TYPE:-smoke}"
          case "$TEST_TYPE" in
            smoke)
              RUN_COMMAND='npm run test:smoke:ci'
              ;;
            all)
              RUN_COMMAND='npm run test:e2e:ci'
              ;;
            *)
              echo "::error::Unknown test type: $TEST_TYPE"
              exit 1
              ;;
          esac

          set +e
          $RUN_COMMAND
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"
        env:
          BASE_URL: http://localhost:3000
          CI: true
          TEST_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_type || 'smoke' }}

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            PASSED=$(jq '.stats.expected // 0' test-results/results.json)
            FAILED=$(jq '.stats.unexpected // 0' test-results/results.json)
          else
            PASSED=0
            FAILED=1
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  comment-on-failure:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: playwright
    if: failure() && github.event_name == 'pull_request'

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Playwright 테스트 실패',
              '',
              'RN web smoke/E2E 게이트에서 실패가 감지되었습니다.',
              '',
              `- 실행 ID: \`${context.runId}\``,
              `- 커밋: \`${context.sha.substring(0, 7)}\``,
              '',
              `[테스트 결과 확인](${runUrl})`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  test-summary:
    name: Playwright Summary
    runs-on: ubuntu-latest
    needs: playwright
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Playwright Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit: \`${{ needs.playwright.outputs.exit_code }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Passed: \`${{ needs.playwright.outputs.passed }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failed: \`${{ needs.playwright.outputs.failed }}\`" >> "$GITHUB_STEP_SUMMARY"

  notify-slack:
    name: Slack Notification
    needs: [playwright]
    if: always() && needs.playwright.result == 'failure'
    uses: ./.github/workflows/slack-notify.yml
    with:
      workflow_name: 'E2E Tests'
      job_status: 'failure'
      failed_jobs: 'playwright'
      pr_number: "${{ github.event.pull_request.number || '' }}"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
