name: QA Monitoring Pipeline

on:
  # 정기 실행 스케줄 (매일 3회)
  schedule:
    - cron: '0 0 * * *'   # 오전 9시 KST (UTC 0:00)
    - cron: '0 6 * * *'   # 오후 3시 KST (UTC 6:00)
    - cron: '0 12 * * *'  # 오후 9시 KST (UTC 12:00)

  # 수동 실행 지원
  workflow_dispatch:
    inputs:
      run_performance:
        description: 'Run performance tests'
        required: false
        default: true
        type: boolean
      run_edge_functions:
        description: 'Run Edge Function health check'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: write

env:
  FLUTTER_VERSION: '3.38.0'
  NODE_VERSION: '20.x'

jobs:
  # =====================================================
  # Job 1: 스모크 테스트
  # =====================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      passed: ${{ steps.results.outputs.passed }}
      failed: ${{ steps.results.outputs.failed }}
      total: ${{ steps.results.outputs.total }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
          # Setup test environment
          cat > .env << 'ENVEOF'
          FLUTTER_TEST_MODE=true
          NODE_ENV=test
          SUPABASE_URL=https://test-placeholder.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QtcGxhY2Vob2xkZXIiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoyMDAwMDAwMDAwfQ.placeholder-test-signature-not-real-key-for-ci-only
          BYPASS_AUTH=true
          USE_MOCK_DATA=true
          MOCK_FORTUNE_RESPONSES=true
          BYPASS_PAYMENT=true
          MOCK_PREMIUM_FEATURES=true
          GOOGLE_WEB_CLIENT_ID=000000000000-placeholder.apps.googleusercontent.com
          GOOGLE_IOS_CLIENT_ID=000000000000-placeholder-ios.apps.googleusercontent.com
          GOOGLE_ANDROID_CLIENT_ID=000000000000-placeholder-android.apps.googleusercontent.com
          GEMINI_API_KEY=AIzaSy-placeholder-test-key
          OPENAI_API_KEY=sk-proj-placeholder-test-key
          KAKAO_REST_API_KEY=placeholder_kakao_key
          ENABLE_ADS=false
          DISABLE_ANALYTICS=true
          ENVEOF
          mkdir -p assets/images/character/lunch assets/decorations assets/icons/traditional assets/animations
          touch assets/images/character/lunch/.gitkeep assets/decorations/.gitkeep assets/icons/traditional/.gitkeep assets/animations/.gitkeep
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Run Smoke Tests
        id: test
        run: |
          # 스모크 테스트 실행
          npm run test:smoke:ci || true
        env:
          CI: true

      - name: Parse test results
        id: results
        run: |
          if [ -f "test-results/results.json" ]; then
            PASSED=$(jq '.stats.expected // 0' test-results/results.json)
            FAILED=$(jq '.stats.unexpected // 0' test-results/results.json)
            TOTAL=$((PASSED + FAILED))
          else
            PASSED=0
            FAILED=1
            TOTAL=1
          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ github.run_id }}
          path: |
            test-results/
          retention-days: 30

  # =====================================================
  # Job 2: 성능 테스트 (Lighthouse)
  # =====================================================
  performance-tests:
    name: Performance Tests (Lighthouse)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.run_performance != 'false' }}
    outputs:
      performance_score: ${{ steps.parse_lighthouse.outputs.performance }}
      lcp: ${{ steps.parse_lighthouse.outputs.lcp }}
      performance_status: ${{ steps.parse_lighthouse.outputs.performance_status }}
      performance_error: ${{ steps.parse_lighthouse.outputs.performance_error }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter Web
        run: |
          # Setup test environment
          cat > .env << 'ENVEOF'
          FLUTTER_TEST_MODE=true
          NODE_ENV=test
          SUPABASE_URL=https://test-placeholder.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QtcGxhY2Vob2xkZXIiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoyMDAwMDAwMDAwfQ.placeholder-test-signature-not-real-key-for-ci-only
          BYPASS_AUTH=true
          USE_MOCK_DATA=true
          MOCK_FORTUNE_RESPONSES=true
          BYPASS_PAYMENT=true
          MOCK_PREMIUM_FEATURES=true
          GOOGLE_WEB_CLIENT_ID=000000000000-placeholder.apps.googleusercontent.com
          GOOGLE_IOS_CLIENT_ID=000000000000-placeholder-ios.apps.googleusercontent.com
          GOOGLE_ANDROID_CLIENT_ID=000000000000-placeholder-android.apps.googleusercontent.com
          GEMINI_API_KEY=AIzaSy-placeholder-test-key
          OPENAI_API_KEY=sk-proj-placeholder-test-key
          KAKAO_REST_API_KEY=placeholder_kakao_key
          ENABLE_ADS=false
          DISABLE_ANALYTICS=true
          ENVEOF
          mkdir -p assets/images/character/lunch assets/decorations assets/icons/traditional assets/animations
          touch assets/images/character/lunch/.gitkeep assets/decorations/.gitkeep assets/icons/traditional/.gitkeep assets/animations/.gitkeep
          flutter pub get
          flutter build web --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install serve
        run: npm install -g serve

      - name: Run Lighthouse
        id: lighthouse_run
        continue-on-error: true
        run: |
          SERVER_PID=""
          cleanup() {
            if [ -n "$SERVER_PID" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
              kill "$SERVER_PID" || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT

          # 서버 시작
          serve build/web -l 3000 >/tmp/fortune-serve.log 2>&1 &
          SERVER_PID=$!
          sleep 5

          # Lighthouse 실행
          npm install -g lighthouse

          LIGHTHOUSE_EXIT=0
          set +e
          lighthouse http://localhost:3000 \
            --output=json \
            --output-path=./lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices
          LIGHTHOUSE_EXIT=$?
          set -e

          echo "lighthouse_exit_code=$LIGHTHOUSE_EXIT" >> $GITHUB_OUTPUT
          exit 0

      - name: Parse Lighthouse report
        id: parse_lighthouse
        if: always()
        run: |
          LIGHTHOUSE_EXIT="${{ steps.lighthouse_run.outputs.lighthouse_exit_code }}"
          PERFORMANCE="NA"
          LCP="NA"
          STATUS="failed"
          ERROR="LIGHTHOUSE_REPORT_MISSING"

          if [ -f "lighthouse-report.json" ]; then
            PERFORMANCE=$(jq -r 'if .categories.performance.score == null then "NA" else (.categories.performance.score * 100 | floor | tostring) end' lighthouse-report.json)
            LCP=$(jq -r 'if .audits["largest-contentful-paint"].numericValue == null then "NA" else (.audits["largest-contentful-paint"].numericValue | floor | tostring) end' lighthouse-report.json)
            ERROR=$(jq -r '.runtimeError.code // .runtimeError.message // .audits["largest-contentful-paint"].errorMessage // .audits.interactive.errorMessage // .audits["total-blocking-time"].errorMessage // ""' lighthouse-report.json)

            if [ "$PERFORMANCE" != "NA" ]; then
              STATUS="ok"
              ERROR=""
            elif [ -n "$ERROR" ]; then
              STATUS="unavailable"
            elif [ -n "$LIGHTHOUSE_EXIT" ] && [ "$LIGHTHOUSE_EXIT" != "0" ]; then
              STATUS="failed"
              ERROR="LIGHTHOUSE_EXIT_${LIGHTHOUSE_EXIT}"
            else
              STATUS="failed"
              ERROR="LIGHTHOUSE_SCORE_MISSING"
            fi
          elif [ -n "$LIGHTHOUSE_EXIT" ] && [ "$LIGHTHOUSE_EXIT" != "0" ]; then
            ERROR="LIGHTHOUSE_EXIT_${LIGHTHOUSE_EXIT}"
          fi

          echo "performance=$PERFORMANCE" >> $GITHUB_OUTPUT
          echo "lcp=$LCP" >> $GITHUB_OUTPUT
          echo "performance_status=$STATUS" >> $GITHUB_OUTPUT
          echo "performance_error=$ERROR" >> $GITHUB_OUTPUT

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: lighthouse-report.json
          retention-days: 30

  # =====================================================
  # Job 3: Edge Function 헬스체크
  # =====================================================
  edge-function-health:
    name: Edge Function Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.run_edge_functions != 'false' }}
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
      total: ${{ steps.health.outputs.total }}
      failed_functions: ${{ steps.health.outputs.failed_functions }}
      failed_details: ${{ steps.health.outputs.failed_details }}
      project_ref: ${{ steps.health.outputs.project_ref }}
      skipped: ${{ steps.health.outputs.skipped }}

    steps:
      - name: Health check Edge Functions
        id: health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          FUNCTIONS=(
            "fortune-daily"
            "fortune-love"
            "fortune-compatibility"
            "fortune-blind-date"
            "fortune-career"
            "fortune-mbti"
            "fortune-dream"
            "fortune-biorhythm"
            "fortune-investment"
            "fortune-moving"
            "calculate-saju"
          )

          HEALTHY=0
          FAILED_LIST=""
          FAILED_DETAILS=""
          TOTAL=${#FUNCTIONS[@]}

          # Supabase URL이 설정되지 않은 경우 건너뛰기
          if [ -z "$SUPABASE_URL" ]; then
            echo "::warning::SUPABASE_URL secret이 설정되지 않았습니다. Edge Function 헬스체크를 건너뜁니다."
            echo "healthy=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "failed_functions=" >> $GITHUB_OUTPUT
            echo "failed_details=" >> $GITHUB_OUTPUT
            echo "project_ref=" >> $GITHUB_OUTPUT
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PROJECT_REF=$(python3 - <<'PY'
          import os
          from urllib.parse import urlparse

          url = os.environ.get("SUPABASE_URL", "").strip()
          hostname = urlparse(url).hostname or ""
          parts = hostname.split(".")
          print(parts[0] if len(parts) >= 3 else "")
          PY
          )

          echo "skipped=false" >> $GITHUB_OUTPUT
          echo "project_ref=$PROJECT_REF" >> $GITHUB_OUTPUT

          for func in "${FUNCTIONS[@]}"; do
            echo "Checking $func..."

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$SUPABASE_URL/functions/v1/$func" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY:-anonymous}" \
              -d '{"healthCheck": true}' \
              --max-time 30 || echo "000")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ]; then
              echo "✅ $func: $STATUS"
              HEALTHY=$((HEALTHY + 1))
            else
              echo "❌ $func: $STATUS"
              FAILED_LIST="$FAILED_LIST $func"
              FAILED_DETAILS="${FAILED_DETAILS}${func}:${STATUS}\n"
            fi
          done

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "failed_functions=$FAILED_LIST" >> $GITHUB_OUTPUT
          {
            echo "failed_details<<EOF"
            printf "%b" "$FAILED_DETAILS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  # =====================================================
  # Job 4: 결과 집계 및 알림
  # =====================================================
  aggregate-and-notify:
    name: Aggregate Results & Notify
    runs-on: ubuntu-latest
    needs: [smoke-tests, performance-tests, edge-function-health]
    if: always()
    outputs:
      failed: ${{ steps.status.outputs.failed }}
      failed_jobs: ${{ steps.status.outputs.failed_jobs }}
      performance_summary: ${{ steps.status.outputs.performance_summary }}
      edge_summary: ${{ steps.status.outputs.edge_summary }}
      project_ref: ${{ steps.status.outputs.project_ref }}

    steps:
      - name: Calculate overall status
        id: status
        run: |
          SMOKE_FAILED="${{ needs.smoke-tests.outputs.failed }}"
          PERF_RESULT="${{ needs.performance-tests.result }}"
          PERF_SCORE="${{ needs.performance-tests.outputs.performance_score }}"
          PERF_STATUS="${{ needs.performance-tests.outputs.performance_status }}"
          PERF_ERROR="${{ needs.performance-tests.outputs.performance_error }}"
          EDGE_RESULT="${{ needs.edge-function-health.result }}"
          EDGE_HEALTHY="${{ needs.edge-function-health.outputs.healthy }}"
          EDGE_TOTAL="${{ needs.edge-function-health.outputs.total }}"
          EDGE_FAILED_DETAILS="${{ needs.edge-function-health.outputs.failed_details }}"
          PROJECT_REF="${{ needs.edge-function-health.outputs.project_ref }}"
          EDGE_SKIPPED="${{ needs.edge-function-health.outputs.skipped }}"

          # 실패 조건 체크
          FAILED=false
          FAILED_JOBS=""

          if [ "$PERF_RESULT" = "skipped" ]; then
            PERFORMANCE_SUMMARY="skipped"
          elif [ "$PERF_STATUS" = "ok" ]; then
            PERFORMANCE_SUMMARY="$PERF_SCORE/100"
          elif [ "$PERF_STATUS" = "unavailable" ]; then
            PERFORMANCE_SUMMARY="N/A (${PERF_ERROR:-UNKNOWN})"
          else
            PERFORMANCE_SUMMARY="failed (${PERF_ERROR:-UNKNOWN})"
          fi

          if [ "$EDGE_RESULT" = "skipped" ]; then
            EDGE_SUMMARY="skipped"
          elif [ "$EDGE_SKIPPED" = "true" ]; then
            EDGE_SUMMARY="skipped (missing secrets)"
          elif [ -n "$EDGE_HEALTHY" ] && [ -n "$EDGE_TOTAL" ]; then
            EDGE_SUMMARY="$EDGE_HEALTHY/$EDGE_TOTAL healthy"
          else
            EDGE_SUMMARY="failed to collect"
          fi

          if [ "$SMOKE_FAILED" != "0" ] && [ -n "$SMOKE_FAILED" ]; then
            FAILED=true
            echo "❌ Smoke tests failed: $SMOKE_FAILED failures"
            FAILED_JOBS="$FAILED_JOBS smoke-tests"
          fi

          if [ "$PERF_RESULT" = "skipped" ]; then
            echo "ℹ️ Performance tests skipped"
          elif [ "$PERF_STATUS" != "ok" ]; then
            FAILED=true
            echo "❌ Performance measurement unavailable: $PERFORMANCE_SUMMARY"
            FAILED_JOBS="$FAILED_JOBS performance"
          elif [ "$PERF_SCORE" -lt 50 ] 2>/dev/null; then
            FAILED=true
            echo "❌ Performance score too low: $PERF_SCORE"
            FAILED_JOBS="$FAILED_JOBS performance"
          fi

          if [ "$EDGE_RESULT" = "skipped" ] || [ "$EDGE_SKIPPED" = "true" ]; then
            echo "ℹ️ Edge Function health checks skipped"
          elif [ -n "$EDGE_HEALTHY" ] && [ -n "$EDGE_TOTAL" ]; then
            if [ "$EDGE_HEALTHY" -lt "$EDGE_TOTAL" ]; then
              FAILED=true
              echo "⚠️ Some Edge Functions unhealthy: $EDGE_HEALTHY/$EDGE_TOTAL"
              printf "%b" "$EDGE_FAILED_DETAILS"
              FAILED_JOBS="$FAILED_JOBS edge-functions"
            fi
          else
            FAILED=true
            echo "❌ Edge Function health outputs missing"
            FAILED_JOBS="$FAILED_JOBS edge-functions"
          fi

          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "failed_jobs=${FAILED_JOBS# }" >> $GITHUB_OUTPUT
          echo "performance_summary=$PERFORMANCE_SUMMARY" >> $GITHUB_OUTPUT
          echo "edge_summary=$EDGE_SUMMARY" >> $GITHUB_OUTPUT
          echo "project_ref=$PROJECT_REF" >> $GITHUB_OUTPUT

      - name: Generate summary
        run: |
          PERFORMANCE_SUMMARY="${{ steps.status.outputs.performance_summary }}"
          EDGE_SUMMARY="${{ steps.status.outputs.edge_summary }}"
          PROJECT_REF="${{ steps.status.outputs.project_ref }}"

          echo "## 📊 QA Monitoring Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**실행 시간:** $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PROJECT_REF" ]; then
            echo "**모니터링 대상 Supabase 프로젝트:** \`$PROJECT_REF\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 테스트 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Smoke Tests | ${{ needs.smoke-tests.outputs.passed }}/${{ needs.smoke-tests.outputs.total }} passed |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Performance | $PERFORMANCE_SUMMARY |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 Edge Functions | $EDGE_SUMMARY |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.status.outputs.failed }}" = "true" ]; then
            echo "### ❌ 실패 감지" >> $GITHUB_STEP_SUMMARY
            echo "자동으로 GitHub Issue가 생성됩니다." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ 모든 테스트 통과" >> $GITHUB_STEP_SUMMARY
          fi

  # =====================================================
  # Job 5: 실패 시 GitHub Issue 생성
  # =====================================================
  create-issue-on-failure:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: [smoke-tests, performance-tests, edge-function-health, aggregate-and-notify]
    if: always() && needs.aggregate-and-notify.outputs.failed == 'true'

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];

            const smokeResults = {
              passed: '${{ needs.smoke-tests.outputs.passed }}',
              failed: '${{ needs.smoke-tests.outputs.failed }}',
              total: '${{ needs.smoke-tests.outputs.total }}'
            };

            const perfScore = '${{ needs.performance-tests.outputs.performance_score }}';
            const perfResult = '${{ needs.performance-tests.result }}';
            const perfStatusValue = '${{ needs.performance-tests.outputs.performance_status }}';
            const perfError = '${{ needs.performance-tests.outputs.performance_error }}';
            const edgeHealthy = '${{ needs.edge-function-health.outputs.healthy }}';
            const edgeTotal = '${{ needs.edge-function-health.outputs.total }}';
            const failedFunctions = '${{ needs.edge-function-health.outputs.failed_functions }}';
            const failedDetails = `${{ needs.edge-function-health.outputs.failed_details }}`.trim();
            const projectRef = '${{ needs.edge-function-health.outputs.project_ref }}';
            const perfBelowThreshold = perfStatusValue === 'ok' && Number.parseInt(perfScore || '0', 10) < 50;
            const edgeSkipped = '${{ needs.edge-function-health.outputs.skipped }}' === 'true';

            const smokeStatus = smokeResults.failed === '0' ? '✅' : '❌';
            const perfMeasured = perfResult !== 'skipped' && perfStatusValue === 'ok';
            const perfUnavailable = perfStatusValue === 'unavailable';
            const perfStatus = perfResult === 'skipped' ? '⏭️' : perfBelowThreshold ? '⚠️' : perfMeasured ? '✅' : '❌';
            const perfSummary = perfResult === 'skipped'
              ? 'skipped'
              : perfMeasured
              ? `${perfScore}/100`
              : perfUnavailable
                ? `N/A (${perfError || 'UNKNOWN'})`
                : `failed (${perfError || 'UNKNOWN'})`;
            const edgeHasCounts = edgeHealthy !== '' && edgeTotal !== '';
            const edgeUnhealthy = !edgeSkipped && edgeHasCounts && Number(edgeHealthy) < Number(edgeTotal);
            const edgeCollectionFailed = !edgeSkipped && !edgeHasCounts;
            const edgeStatus = edgeSkipped ? '⏭️' : edgeCollectionFailed ? '❌' : edgeUnhealthy ? '⚠️' : '✅';
            const edgeSummary = edgeSkipped
              ? 'skipped (missing secrets)'
              : edgeHasCounts
                ? `${edgeHealthy}/${edgeTotal} healthy`
                : 'failed to collect';

            let bodyLines = [
              '## 🚨 QA 모니터링 실패 보고서',
              '',
              `**일시:** ${date}`,
              `**실행 ID:** \`${context.runId}\``,
              projectRef ? `**Supabase 프로젝트:** \`${projectRef}\`` : null,
              '',
              '### 테스트 결과',
              '',
              '| 항목 | 결과 | 상태 |',
              '|------|------|------|',
              `| Smoke Tests | ${smokeResults.passed}/${smokeResults.total} passed | ${smokeStatus} |`,
              `| Performance | ${perfSummary} | ${perfStatus} |`,
              `| Edge Functions | ${edgeSummary} | ${edgeStatus} |`,
              ''
            ];

            if (smokeResults.failed !== '0') {
              bodyLines.push('### ❌ Smoke Test 실패');
              bodyLines.push(`${smokeResults.failed}개의 라우트 테스트가 실패했습니다.`);
              bodyLines.push('');
            }

            if (perfResult === 'skipped') {
              bodyLines.push('### ⏭️ 성능 측정 생략');
              bodyLines.push('이번 실행에서는 Performance 테스트가 수동으로 비활성화되었습니다.');
              bodyLines.push('');
            } else if (!perfMeasured) {
              bodyLines.push('### ❌ 성능 측정 실패');
              bodyLines.push(`Performance score를 계산할 수 없습니다. 원인: ${perfError || 'UNKNOWN'}`);
              bodyLines.push('');
            } else if (perfBelowThreshold) {
              bodyLines.push('### ❌ 성능 저하');
              bodyLines.push(`Performance score가 ${perfScore}점으로 기준(50점) 미달입니다.`);
              bodyLines.push('');
            }

            if (!edgeSkipped && failedFunctions && failedFunctions.trim()) {
              bodyLines.push('### ⚠️ Edge Function 이상');
              bodyLines.push('다음 함수들이 응답하지 않습니다:');
              bodyLines.push('```');
              bodyLines.push(failedDetails || failedFunctions);
              bodyLines.push('```');
              bodyLines.push('');
            } else if (edgeCollectionFailed) {
              bodyLines.push('### ❌ Edge Function 측정 실패');
              bodyLines.push('Edge Function health 결과를 수집하지 못했습니다.');
              bodyLines.push('');
            }

            bodyLines.push('### 조치 방법');
            bodyLines.push(`1. [워크플로우 로그 확인](${runUrl})`);
            bodyLines.push('2. 실패한 테스트 분석');
            bodyLines.push('3. 문제 수정 후 재테스트');
            bodyLines.push('');
            bodyLines.push('---');
            bodyLines.push('*이 이슈는 QA 모니터링 파이프라인에서 자동 생성되었습니다.*');

            const body = bodyLines.filter(Boolean).join('\n');

            // 동일한 날짜의 이슈가 이미 있는지 확인
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'qa-failure',
              state: 'open'
            });

            const todayIssue = existingIssues.data.find(issue =>
              issue.title.includes(date)
            );

            if (todayIssue) {
              // 기존 이슈에 코멘트 추가
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: todayIssue.number,
                body: `## 📝 추가 실패 보고\n\n${body}`
              });
              console.log(`Updated existing issue #${todayIssue.number}`);
            } else {
              // 새 이슈 생성
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 QA 테스트 실패 - ${date}`,
                body: body,
                labels: ['bug', 'qa-failure', 'automated']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

  close-issues-on-success:
    name: Close QA Failure Issues
    runs-on: ubuntu-latest
    needs: [aggregate-and-notify]
    if: always() && needs.aggregate-and-notify.outputs.failed != 'true'

    steps:
      - name: Close open qa-failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'qa-failure',
              state: 'open',
            });

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `QA 모니터링이 정상으로 복구되어 자동으로 닫습니다. [해당 실행 로그](${runUrl})`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

  # =====================================================
  # Job 7: Slack 알림 (실패 시)
  # =====================================================
  notify-slack:
    name: Slack Notification
    needs: [smoke-tests, performance-tests, edge-function-health, aggregate-and-notify]
    if: always() && needs.aggregate-and-notify.outputs.failed == 'true'
    uses: ./.github/workflows/slack-notify.yml
    with:
      workflow_name: "QA Monitoring"
      job_status: "failure"
      failed_jobs: "${{ needs.aggregate-and-notify.outputs.failed_jobs }}"
      custom_message: "Performance: ${{ needs.aggregate-and-notify.outputs.performance_summary }} | Edge: ${{ needs.aggregate-and-notify.outputs.edge_summary }}${{ needs.aggregate-and-notify.outputs.project_ref != '' && format(' | Ref: {0}', needs.aggregate-and-notify.outputs.project_ref) || '' }}"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
