name: Flutter CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FLUTTER_VERSION: '3.38.0'

jobs:
  analyze:
    name: Flutter Format & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup test environment
        run: |
          cat > .env << 'ENVEOF'
          FLUTTER_TEST_MODE=true
          NODE_ENV=test
          SUPABASE_URL=https://test-placeholder.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QtcGxhY2Vob2xkZXIiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoyMDAwMDAwMDAwfQ.placeholder-test-signature-not-real-key-for-ci-only
          BYPASS_AUTH=true
          USE_MOCK_DATA=true
          MOCK_FORTUNE_RESPONSES=true
          BYPASS_PAYMENT=true
          MOCK_PREMIUM_FEATURES=true
          GOOGLE_WEB_CLIENT_ID=000000000000-placeholder.apps.googleusercontent.com
          GOOGLE_IOS_CLIENT_ID=000000000000-placeholder-ios.apps.googleusercontent.com
          GOOGLE_ANDROID_CLIENT_ID=000000000000-placeholder-android.apps.googleusercontent.com
          GEMINI_API_KEY=AIzaSy-placeholder-test-key
          OPENAI_API_KEY=sk-proj-placeholder-test-key
          KAKAO_REST_API_KEY=placeholder_kakao_key
          ENABLE_ADS=false
          DISABLE_ANALYTICS=true
          ENVEOF
          mkdir -p assets/images/character/lunch assets/decorations assets/icons/traditional assets/animations
          touch assets/images/character/lunch/.gitkeep assets/decorations/.gitkeep assets/icons/traditional/.gitkeep assets/animations/.gitkeep

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --test-randomize-ordering-seed random

      - name: Generate LCOV report
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

          lcov --remove coverage/lcov.info \
            '*.freezed.dart' \
            '*.g.dart' \
            '*.gen.dart' \
            '*/generated/*' \
            --ignore-errors unused \
            -o coverage/lcov.info

          lcov --summary coverage/lcov.info

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-flutter

      - name: Check minimum coverage
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -E "lines\.+:" | sed -E 's/.*lines\.+:\ +([0-9.]+)%.*/\1/')
          echo "Current coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::warning::Coverage $COVERAGE% is below 80% threshold"
          fi

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-results
          path: coverage/

  notify-slack:
    name: Slack Notification
    needs: [analyze, test]
    if: always() && (needs.analyze.result == 'failure' || needs.test.result == 'failure')
    uses: ./.github/workflows/slack-notify.yml
    with:
      workflow_name: 'Flutter CI/CD'
      job_status: 'failure'
      failed_jobs: "${{ needs.analyze.result == 'failure' && 'analyze ' || '' }}${{ needs.test.result == 'failure' && 'test ' || '' }}"
      pr_number: "${{ github.event.pull_request.number || '' }}"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
