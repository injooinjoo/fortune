name: Dependency Update & Security Patch

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.1 --activate

      - name: Update workspace dependencies
        run: |
          pnpm update --recursive --latest
          pnpm audit --prod || true

      - name: Check PR creation permission
        id: pr-permission
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERMISSIONS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/permissions/workflow")

          CAN_APPROVE=$(echo "$PERMISSIONS_JSON" | jq -r '.can_approve_pull_request_reviews // false')

          if [ "$CAN_APPROVE" = "true" ]; then
            echo "allow_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "allow_pr=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⚠️ Dependency PR creation skipped"
              echo ""
              echo "Repository setting \`Allow GitHub Actions to create and approve pull requests\` is disabled."
              echo "Enable it to allow automated dependency PR creation."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create Pull Request
        if: steps.pr-permission.outputs.allow_pr == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies and security patches'
          title: 'Weekly Dependency Update'
          body: |
            ## 🔄 Automated Dependency Update
            
            This PR contains:
            - pnpm workspace package updates
            - Security patches
            
            Please review and test before merging.
          branch: deps/weekly-update
          delete-branch: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run pnpm audit
        run: |
          echo "## PNPM Audit Report" >> $GITHUB_STEP_SUMMARY
          pnpm audit --prod >> $GITHUB_STEP_SUMMARY || true

  # Slack 알림 (실패 시)
  notify-slack:
    name: Slack Notification
    needs: [update-dependencies, security-audit]
    if: always() && (failure() || cancelled())
    uses: ./.github/workflows/slack-notify.yml
    with:
      workflow_name: "Dependency Update"
      job_status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'cancelled' }}
      failed_jobs: "${{ needs.update-dependencies.result == 'failure' && 'update-dependencies ' || '' }}${{ needs.security-audit.result == 'failure' && 'security-audit' || '' }}"
      custom_message: "주간 의존성 업데이트 실패. 수동 개입 필요."
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
