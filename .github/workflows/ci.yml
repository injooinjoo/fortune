name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  repository-guards:
    name: Source Inventory & Figma Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check source inventory drift
        run: |
          if ! npm run source-inventory:check; then
            echo "::error::Source inventory drift detected. Run 'npm run repo:sync' and commit generated outputs."
            exit 1
          fi

      - name: Check Figma sync drift
        run: npm run figma:guard

      - name: Upload Figma sync report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: figma-sync-report
          path: artifacts/design/figma_sync/
          retention-days: 7

  notify-slack:
    name: Slack Notification
    needs: [repository-guards]
    if: always() && (needs.repository-guards.result == 'failure' || needs.repository-guards.result == 'cancelled')
    uses: ./.github/workflows/slack-notify.yml
    with:
      workflow_name: 'CI Pipeline'
      job_status: ${{ needs.repository-guards.result == 'failure' && 'failure' || 'cancelled' }}
      failed_jobs: 'repository-guards'
      pr_number: ${{ github.event.pull_request.number || '' }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
